services:
  - type: web
    name: pige-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: pige-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: pige-db
    databaseName: pige
